name: Deploy Bookstore

on:
  push:
    branches: [ "feature/split-deploy" ] 
    paths:
      - 'api/**'         
      - 'EFModels/**'    
      - 'frontend/**'   
      - 'api.tests/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore api/api/SPI.csproj

      - name: Run Backend Tests
        run: dotnet test api.tests/api.tests.csproj --configuration Release --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[EFModels]EFModels.Migrations.*"

      - name: Generate Backend Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
        with:
          reports: '**/TestResults/*/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'MarkdownSummary'

      - name: Add Backend Coverage to Summary
        if: always()
        run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci 

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npx vitest run --coverage

      - name: Generate Frontend Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: frontend/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Add Frontend Coverage to Summary
        if: always()
        run: |
          echo "### Frontend Test Metrics" >> $GITHUB_STEP_SUMMARY
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # --- BACKEND NASAZENÍ ---
      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR_LOGIN_SERVER=${{ vars.ACR_NAME }}.azurecr.io
          IMAGE_NAME=backend-api
          
          docker build --platform linux/amd64 \
            -f api/Dockerfile \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            .
          
          docker push -a $ACR_LOGIN_SERVER/$IMAGE_NAME

      - name: Restart App Service
        run: |
          az webapp restart --name app-psi-backend-shared --resource-group rg-bookstore-shared

      # --- FRONTEND NASAZENÍ DO STORAGE ACCOUNTU ---
      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm run build

      - name: Deploy Frontend to Azure Storage
        run: |
          # 1. Najde název nového Storage Accountu pro frontend
          ACCOUNT_NAME=$(az storage account list -g rg-bookstore-shared --query "[?starts_with(name, 'stfrontend')].name" -o tsv)
          
          if [ -z "$ACCOUNT_NAME" ]; then
            echo "Storage Account nebyl nalezen. Ujisti se, že proběhlo nasazení Bicep infrastruktury."
            exit 1
          fi

          # 2. Získá přístupový klíč k účtu
          ACCOUNT_KEY=$(az storage account keys list -g rg-bookstore-shared -n $ACCOUNT_NAME --query "[0].value" -o tsv)

          # 3. Zapne funkci Static Website
          az storage blob service-properties update \
            --account-name $ACCOUNT_NAME \
            --account-key $ACCOUNT_KEY \
            --static-website true \
            --404-document index.html \
            --index-document index.html

          # 4. Nahraje zkompilovaný kód do webového kontejneru $web
          az storage blob upload-batch \
            --account-name $ACCOUNT_NAME \
            --account-key $ACCOUNT_KEY \
            --source ./frontend/dist \
            --destination '$web' \
            --overwrite

          # 5. Vytiskne URL do GitHub Action Summary
          WEB_URL=$(az storage account show -n $ACCOUNT_NAME -g rg-bookstore-shared --query "primaryEndpoints.web" -o tsv)
          echo "Adresa webu je: **$WEB_URL**" >> $GITHUB_STEP_SUMMARY