name: Deploy Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install & Test
        working-directory: ./frontend
        run: |
          npm ci
          npx vitest run --coverage

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy-frontend:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Storage
        run: |
          # Dynamické nalezení storage accountu
          ACCOUNT_NAME=$(az storage account list -g rg-bookstore-shared \
            --query "[?starts_with(name, 'stfrontend')].name | [0]" \
            -o tsv)

          ACCOUNT_KEY=$(az storage account keys list \
            -g rg-bookstore-shared \
            -n "$ACCOUNT_NAME" \
            --query "[0].value" \
            -o tsv)

          echo "Using storage: $ACCOUNT_NAME"
          echo "Key length: ${#ACCOUNT_KEY}"

          az storage blob service-properties update \
            --account-name "$ACCOUNT_NAME" \
            --account-key "$ACCOUNT_KEY" \
            --static-website \
            --index-document index.html \
            --404-document index.html
          
          # Nahrání souborů pomocí OIDC
          az storage blob upload-batch \
            --account-name $ACCOUNT_NAME \
            --auth-mode login \
            --source ./dist \
            --destination '$web' \
            --overwrite

          WEB_URL=$(az storage account show -n $ACCOUNT_NAME -g rg-bookstore-shared --query "primaryEndpoints.web" -o tsv)
          echo "### Frontend nasazen! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Adresa: $WEB_URL" >> $GITHUB_STEP_SUMMARY