name: Deploy Bookstore

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api/**'         
      - 'EFModels/**'    
      - 'frontend/**'   
      - 'api.tests/**'  # PŘIDÁNO: trigger i při změně testů
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore api/api/SPI.csproj

      - name: Run Tests
        run: dotnet test api.tests/api.tests.csproj --configuration Release --collect:"XPlat Code Coverage"

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.xml'

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR_LOGIN_SERVER=${{ vars.ACR_NAME }}.azurecr.io
          IMAGE_NAME=backend-api
          
          docker build --platform linux/amd64 \
            -f api/Dockerfile \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            .
          
          docker push -a $ACR_LOGIN_SERVER/$IMAGE_NAME

      - name: Restart App Service
        run: |
          az webapp restart --name app-psi-backend-shared --resource-group rg-bookstore-shared