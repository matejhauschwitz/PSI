name: Deploy Infrastructure

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infrastructer/**' 
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  bicep-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep Lint & Validate
        run: |
          az bicep build --file ./infrastructer/shared.bicep
          az deployment group validate \
            --resource-group rg-bookstore-shared \
            --template-file ./infrastructer/shared.bicep \
            --parameters prefix=psi location=polandcentral \
                         administratorLoginPassword=${{ secrets.DB_PASSWORD }} \
                         jwtSecret=${{ secrets.JWT_SECRET }}

  bicep-deploy:
    needs: bicep-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Shared Resources
        id: deploy
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-bookstore-shared
          template: ./infrastructer/shared.bicep 
          parameters: >
            prefix=psi 
            location=polandcentral 
            administratorLoginPassword=${{ secrets.DB_PASSWORD }} 
            jwtSecret=${{ secrets.JWT_SECRET }}
          failOnStdErr: false

      - name: Display Deployment Outputs
        run: |
          echo "Frontend URL: ${{ steps.deploy.outputs.frontendUrl }}"
          echo "ACR Name: ${{ steps.deploy.outputs.acrName }}"