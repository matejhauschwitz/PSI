name: Deploy Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install & Test
        working-directory: ./frontend
        run: |
          npm ci
          npx vitest run --coverage

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy-frontend:
    needs: test-and-build
    runs-on: ubuntu-latest
    outputs:
      WEB_URL: ${{ steps.deploy.outputs.WEB_URL }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure Storage
        id: deploy
        run: |
          set -e
          ACCOUNT_NAME=$(az storage account list -g rg-bookstore-shared --query "[?contains(name, 'bookstore')].name | [0]" -o tsv)
          
          ACCOUNT_KEY=$(az storage account keys list -g rg-bookstore-shared -n "$ACCOUNT_NAME" --query "[0].value" -o tsv)

          az storage blob service-properties update \
            --account-name "$ACCOUNT_NAME" \
            --account-key "$ACCOUNT_KEY" \
            --static-website true \
            --404-document index.html \
            --index-document index.html

          az storage blob upload-batch \
            --account-name "$ACCOUNT_NAME" \
            --account-key "$ACCOUNT_KEY" \
            --source ./dist \
            --destination '$web' \
            --overwrite

          WEB_URL=$(az storage account show -n "$ACCOUNT_NAME" -g rg-bookstore-shared --query "primaryEndpoints.web" -o tsv)
          
          echo "WEB_URL=$WEB_URL" >> $GITHUB_OUTPUT
          echo "### Frontend nasazen! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Adresa: $WEB_URL" >> $GITHUB_STEP_SUMMARY

  performance-audit:
    needs: deploy-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        id: lighthouse_audit
        with:
          urls: ${{ needs.deploy-frontend.outputs.WEB_URL }}
          uploadArtifacts: false 
          temporaryPublicStorage: true

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/

      - name: Format Lighthouse Score
        if: success() || failure()
        run: |
          RESULTS_JSON='${{ steps.lighthouse_audit.outputs.manifest }}'
          
          if [ "$RESULTS_JSON" != "" ] && [ "$RESULTS_JSON" != "null" ]; then
            
            EXTRACT_SCORE() {
              echo $RESULTS_JSON | jq -r "if type==\"array\" then .[0].summary.$1 else .summary.$1 end | . * 100 | floor"
            }

            SCORE_PERF=$(EXTRACT_SCORE "performance")
            SCORE_ACC=$(EXTRACT_SCORE "accessibility")
            SCORE_BP=$(EXTRACT_SCORE "best-practices")
            SCORE_SEO=$(EXTRACT_SCORE "seo")
            
            REPORT_URL=$(echo '${{ steps.lighthouse_audit.outputs.links }}' | jq -r 'if type=="array" then .[0] else . end')

            echo "### ⚡ Lighthouse Audit Výsledky" >> $GITHUB_STEP_SUMMARY
            echo "| Kategorie | Skóre |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            echo "| 🚀 Performance | $SCORE_PERF |" >> $GITHUB_STEP_SUMMARY
            echo "| ♿ Accessibility | $SCORE_ACC |" >> $GITHUB_STEP_SUMMARY
            echo "| 🛡️ Best Practices | $SCORE_BP |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔍 SEO | $SCORE_SEO |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[Zobrazit kompletní report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Lighthouse report nebyl vygenerován" >> $GITHUB_STEP_SUMMARY
          fi