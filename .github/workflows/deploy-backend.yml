name: Deploy Bookstore

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api/**'         
      - 'EFModels/**'    
      - 'frontend/**'   
      - 'api.tests/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore api/api/SPI.csproj

      - name: Run Backend Tests
        run: dotnet test api.tests/api.tests.csproj --configuration Release --collect:"XPlat Code Coverage"

      - name: Generate Backend Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
        with:
          reports: '**/TestResults/*/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'MarkdownSummary'

      - name: Add Backend Coverage to Summary
        if: always()
        run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci 

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npx vitest run --coverage

      - name: Generate Frontend Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: frontend/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Add Frontend Coverage to Summary
        if: always()
        run: |
          echo "### Frontend Test Metrics" >> $GITHUB_STEP_SUMMARY
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR_LOGIN_SERVER=${{ vars.ACR_NAME }}.azurecr.io
          IMAGE_NAME=backend-api
          
          docker build --platform linux/amd64 \
            -f api/Dockerfile \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            .
          
          docker push -a $ACR_LOGIN_SERVER/$IMAGE_NAME

      - name: Restart App Service
        run: |
          az webapp restart --name app-psi-backend-shared --resource-group rg-bookstore-shared