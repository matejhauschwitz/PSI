name: Deploy Infrastructure

on:
  push:
    branches: [ "feature/split-deploy" ]
    paths:
      - 'infrastructer/**' 
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  bicep-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Shared Resources
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-bookstore-shared
          template: ./infrastructer/shared.bicep 
          parameters: prefix=psi location=polandcentral administratorLoginPassword=${{ secrets.DB_PASSWORD }} jwtSecret=${{ secrets.JWT_SECRET }}
          failOnStdErr: false